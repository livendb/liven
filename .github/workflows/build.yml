name: Build & Verify Liven

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Ensure only one workflow runs per branch at a time to optimize resources
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Fast check: runs on every PR and push ──
  check:
    name: Lint & Core Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "ui/package-lock.json"

      - name: Install UI dependencies & Build Frontend
        working-directory: ui
        shell: bash
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Verify code formatting
        run: cargo fmt --all -- --check

      - name: Lint with clippy (lib + tests, no benches)
        run: cargo clippy --lib --tests -- -D warnings

      - name: Test embedded core (no default features)
        run: cargo test --no-default-features --lib --tests

      - name: Test full suite (lib + tests, no benches)
        run: cargo test --lib --tests

      - name: Audit dependencies
        run: |
          cargo install cargo-audit --locked 2>&1 || true
          cargo audit

  # ── Full build: cross-platform, release, install tests, packaging ──
  build:
    name: Full Build (${{ matrix.os }} ${{ matrix.target }})
    if: github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            arch: amd64
            pkg_ext: ""
          # Linux ARM64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            arch: arm64
            pkg_ext: ""
          # macOS Intel
          - os: macos-13
            target: x86_64-apple-darwin
            arch: x64
            pkg_ext: ""
          # macOS Apple Silicon
          - os: macos-14
            target: aarch64-apple-darwin
            arch: arm64
            pkg_ext: ""
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            arch: amd64
            pkg_ext: ".exe"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "ui/package-lock.json"

      - name: Install UI dependencies & Build Frontend
        working-directory: ui
        shell: bash
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: ${{ matrix.target }}

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      # ── Use mold linker on Linux for ~5x faster LTO linking ──
      - name: Install mold linker (Linux x86_64)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq mold
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER=clang" >> $GITHUB_ENV
          echo "RUSTFLAGS=-C link-arg=-fuse-ld=mold" >> $GITHUB_ENV

      - name: Build release binary for ${{ matrix.target }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage runtime config alongside binary
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp liven.toml target/${{ matrix.target }}/release/liven.toml
          else
            cp liven.toml target/${{ matrix.target }}/release/liven.toml
          fi

      # ── Installation tests ──
      - name: Run Installation Tests (Linux x86_64)
        if: matrix.os == 'ubuntu-latest'
        timeout-minutes: 10
        run: |
          echo "==== Linux x86_64 Installation Tests ===="
          chmod +x install.sh
          export BINARY_PATH="target/${{ matrix.target }}/release/liven"

          # 1. Production install
          sudo ./install.sh --env production

          grep -q 'environment = "production"' /etc/liven/liven.toml
          test -f /etc/liven/certs/ca.crt
          test -f /etc/liven/certs/ca.key
          test -f /etc/liven/certs/server.crt
          test -f /etc/liven/certs/server.key
          [ "$(stat -c '%a' /etc/liven/certs/server.key)" = "600" ]
          [ "$(stat -c '%a' /etc/liven/certs/ca.key)" = "600" ]
          test -f /etc/systemd/system/liven.service

          # 2. Container fallback (Debian)
          docker run --rm -v ${{ github.workspace }}:/workspace debian:bookworm-slim sh -c "
            cp /workspace/install.sh /install.sh &&
            chmod +x /install.sh &&
            mkdir -p /target/${{ matrix.target }}/release &&
            cp /workspace/target/${{ matrix.target }}/release/liven /target/${{ matrix.target }}/release/liven &&
            chmod +x /target/${{ matrix.target }}/release/liven &&
            ./install.sh --env development &&
            test -f /usr/local/bin/liven &&
            test -f /usr/local/bin/liven-entrypoint &&
            ! test -f /etc/systemd/system/liven.service &&
            grep -q 'environment = \"development\"' /etc/liven/liven.toml
          "

          # 3. Live-process boot
          echo "Booting mTLS protected production LIVEN in background..."
          sudo /usr/local/bin/liven start --config /etc/liven/liven.toml &
          DB_PID=$!
          sleep 3
          sudo ss -tlnp | grep -q 43121
          curl -v --connect-timeout 3 --max-time 8 http://127.0.0.1:43121/api/streams \
            && (echo "FAIL: Cleartext succeeded in production!" && exit 1) \
            || echo "PASS: Cleartext rejected by mTLS shield"
          sudo kill -15 $DB_PID || true

      - name: Run Installation Tests (Linux ARM64)
        if: matrix.os == 'ubuntu-24.04-arm'
        timeout-minutes: 10
        run: |
          echo "==== Linux ARM64 Installation Tests ===="
          chmod +x install.sh
          export BINARY_PATH="target/${{ matrix.target }}/release/liven"
          sudo ./install.sh --env development
          grep -q 'environment = "development"' /etc/liven/liven.toml
          test -f /usr/local/bin/liven
          echo "PASS: ARM64 installation test passed"

      - name: Run Installation Tests (macOS Intel)
        if: matrix.os == 'macos-13'
        timeout-minutes: 10
        run: |
          echo "==== macOS Intel Installation Tests ===="
          chmod +x install.sh
          sudo ./install.sh --env development
          grep -q 'environment = "development"' /etc/liven/liven.toml
          test -f /Library/LaunchDaemons/com.liven.liven.plist
          test -f /usr/local/bin/liven
          echo "Booting cleartext development LIVEN in background..."
          sudo /usr/local/bin/liven start --config /etc/liven/liven.toml &
          DB_PID=$!
          sleep 3
          if curl -v --connect-timeout 3 --max-time 8 http://127.0.0.1:43120/api/streams; then
            echo "PASS: Development API connection succeeded"
          else
            echo "FAIL: Development API connection failed" && exit 1
          fi
          sudo kill -15 $DB_PID || true

      - name: Run Installation Tests (macOS Apple Silicon)
        if: matrix.os == 'macos-14'
        timeout-minutes: 10
        run: |
          echo "==== macOS Apple Silicon Installation Tests ===="
          chmod +x install.sh
          sudo ./install.sh --env development
          grep -q 'environment = "development"' /etc/liven/liven.toml
          test -f /Library/LaunchDaemons/com.liven.liven.plist
          test -f /usr/local/bin/liven
          echo "PASS: Apple Silicon installation test passed"

      - name: Run Installation Tests (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        timeout-minutes: 10
        run: |
          echo "==== Windows Installation Tests ===="
          INSTALL_OUTPUT=$(./install.sh)
          echo "$INSTALL_OUTPUT" | grep -q "Windows Deployment Instructions"
          echo "PASS: Windows instructions successfully returned"

      - name: Upload compiled executable (Unix)
        if: matrix.os != 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: liven-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            target/${{ matrix.target }}/release/liven
            target/${{ matrix.target }}/release/liven.toml
          if-no-files-found: error

      - name: Upload compiled executable (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: liven-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            target/${{ matrix.target }}/release/liven.exe
            target/${{ matrix.target }}/release/liven.toml
          if-no-files-found: error

  # ── Packaging: depends on build artifacts ──
  package:
    name: Package Distribution (${{ matrix.os }} ${{ matrix.arch }})
    if: github.event_name == 'push'
    needs: build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            arch: arm64
            target: aarch64-unknown-linux-gnu
          - os: macos-13
            arch: x64
            target: x86_64-apple-darwin
          - os: macos-14
            arch: arm64
            target: aarch64-apple-darwin
          - os: windows-latest
            arch: amd64
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Download compiled executable
        uses: actions/download-artifact@v8
        with:
          name: liven-${{ matrix.os }}-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release

      - name: Install cargo-binstall (pre-built binary installer)
        run: |
          curl -fsSL https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install packaging tools via binstall (skip compilation)
        run: |
          cargo binstall cargo-deb --no-confirm --locked 2>&1 || echo "Warning: cargo-deb install failed"
          cargo binstall cargo-generate-rpm --no-confirm --locked 2>&1 || echo "Warning: cargo-generate-rpm install failed"
          cargo binstall cargo-wix --no-confirm --locked 2>&1 || echo "Warning: cargo-wix install failed"

      - name: Package Linux (.deb, .rpm, .tar.gz)
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm'
        run: |
          chmod +x target/${{ matrix.target }}/release/liven
          # Build .deb
          cargo deb --target ${{ matrix.target }} --no-build || echo "Warning: cargo deb failed, skipping .deb"
          # Build .rpm
          cargo generate-rpm --target ${{ matrix.target }} --no-build || echo "Warning: cargo generate-rpm failed, skipping .rpm"
          # Create tarball
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            TAR_NAME="liven-linux-amd64.tar.gz"
          else
            TAR_NAME="liven-linux-arm64.tar.gz"
          fi
          tar -czvf $TAR_NAME -C target/${{ matrix.target }}/release liven liven.toml
          mkdir -p dist
          mv target/${{ matrix.target }}/debian/*.deb dist/ 2>/dev/null || true
          mv target/${{ matrix.target }}/generate-rpm/*.rpm dist/ 2>/dev/null || true
          mv $TAR_NAME dist/

      - name: Package Windows (.msi, .zip)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          echo "==== Packaging Windows Distribution Assets ===="
          cargo wix --target ${{ matrix.target }} --no-build || echo "Warning: cargo wix failed, skipping .msi"
          powershell -Command "Compress-Archive -Path target/${{ matrix.target }}/release/liven.exe, liven.toml -DestinationPath liven-windows-amd64.zip"
          mkdir -p dist
          mv target/${{ matrix.target }}/wix/*.msi dist/ 2>/dev/null || true
          mv liven-windows-amd64.zip dist/

      - name: Package macOS (.tar.gz)
        if: matrix.os == 'macos-13' || matrix.os == 'macos-14'
        run: |
          echo "==== Packaging macOS Distribution Assets ===="
          mkdir -p dist
          chmod +x target/${{ matrix.target }}/release/liven
          if [ "${{ matrix.arch }}" = "x64" ]; then
            TAR_NAME="liven-macos-x64.tar.gz"
          else
            TAR_NAME="liven-macos-arm64.tar.gz"
          fi
          tar -czvf $TAR_NAME -C target/${{ matrix.target }}/release liven liven.toml
          mv $TAR_NAME dist/

      - name: Upload Packaged Installers
        uses: actions/upload-artifact@v7
        with:
          name: liven-installers-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: ignore
