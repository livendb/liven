<svg
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 60 60"
    width="60"
    height="60"
>
  <!-- Shimmer effect across all bars -->
  <defs>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FB7185" stop-opacity="0.1" />
      <stop offset="50%" stop-color="#ff5c35" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#11B981" stop-opacity="0.1" />
      <animateTransform
                attributeName="gradientTransform"
                type="translate"
                values="-1 0;2 0"
                dur="1.5s"
                repeatCount="1"
                fill="freeze"
            />
    </linearGradient>
  </defs>

  <rect x="4" y="8" width="28" height="10" rx="2" fill="url(#shimmer)" />
  <rect x="4" y="22" width="38" height="10" rx="2" fill="url(#shimmer)" />
  <rect x="4" y="36" width="48" height="10" rx="2" fill="url(#shimmer)" />

  <!-- Fade to solid after shimmer -->
  <rect x="4" y="8" width="28" height="10" rx="2" fill="#FB7185" opacity="0">
    <animate
            attributeName="opacity"
            values="0;1"
            dur="0.5s"
            begin="1.5s"
            fill="freeze"
        />
  </rect>
  <rect x="4" y="22" width="38" height="10" rx="2" fill="#ff5c35" opacity="0">
    <animate
            attributeName="opacity"
            values="0;1"
            dur="0.5s"
            begin="1.5s"
            fill="freeze"
        />
  </rect>
  <rect x="4" y="36" width="48" height="10" rx="2" fill="#11B981" opacity="0">
    <animate
            attributeName="opacity"
            values="0;1"
            dur="0.5s"
            begin="1.5s"
            fill="freeze"
        />
  </rect>
</svg>
